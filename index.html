<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Page</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f4f4f4;
    }

    header {
        background: #2874f0;
        color: white;
        padding: 15px;
        text-align: center;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .product {
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        transition: 0.3s;
    }

    .product:hover {
        transform: translateY(-5px);
    }

    .product img {
        width: 100%;
        height: 220px;
        object-fit: cover;
    }

    .product-info {
        padding: 15px;
        text-align: center;
    }

    .product-info h3 {
        margin-bottom: 10px;
    }

    .price {
        color: green;
        font-size: 20px;
        margin-bottom: 10px;
    }

    button {
        background: #ff9f00;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #fb641b;
    }
</style>
</head>

<body>

<header>
    <h1>My Online Shop</h1>
</header>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/300x220" alt="Product 1">
        <div class="product-info">
            <h3>Wireless Headphones</h3>
            <p class="price">$49.99</p>
            <button onclick="addToCart('Wireless Headphones')">
                Add to Cart
            </button>
        </div>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x220" alt="Product 2">
        <div class="product-info">
            <h3>Smart Watch</h3>
            <p class="price">$79.99</p>
            <button onclick="addToCart('Smart Watch')">
                Add to Cart
            </button>
        </div>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x220" alt="Product 3">
        <div class="product-info">
            <h3>Running Shoes</h3>
            <p class="price">$59.99</p>
            <button onclick="addToCart('Running Shoes')">
                Add to Cart
            </button>
        </div>
    </div>

</div>

<script>
function addToCart(productName) {
    alert(productName + " added to cart!");
}
</script>

</body>
</html>
